<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>M E L I S A Y U</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css?family=Inconsolata|Major+Mono+Display&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <!-- TRIGGER PROFILE MODAL -->
        <div class="black-navbar" id="open">
            <img class="icon open" src="./img/icon.png">
        </div>
        <div class="white-navbar" id="close">
            <img class="icon close" src="img/icon-invert.png">
        </div>
    </header>
    <div class="banner">
        <h1 class="intro">Melisa
            <span
                class="txt-rotate"
                data-period="2000"
                data-rotate='[ "is a former teacher.", "likes to learn.", "likes to create.",
                            "learned how to code.", "is now a web developer.", "enjoys her job as a developer.",
                            "also likes to play games and read books.", "listens to post-rock music." ]'>
            </span>
        </h1>
        <h3>Melisa is a girl who likes to &lt;code&gt;.</h3>
    </div>

    <!-- PORTFOLIO SHOWCASE -->
    <div class="box">
        <div class="box-content">
            <h2>My Portfolio Showcase</h2>
            <p>IN PROGRESS</p>
            <div class="portfolios"></div>
        </div>
        <footer>
            <p>&copy; Melisa Yulia Kristina 2019</p>
        </footer>
    </div>

    <!-- SHOW PROFILE (MODAL CONTENT) -->
    <div class="profile" id="profile">
        <div class="content">
            <p class="profile-title">NAMA</p>
            <p class="sub">blablablabla</p>
            <p>Lorem Ipsum</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
